<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Boleto - LedgerFlow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2>LedgerFlow</h2>
            <nav>
                <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
                <a href="{{ url_for('clientes.lista') }}">Clientes</a>
                <a href="{{ url_for('clientes.novo') }}">Novo Cliente</a>
                <a href="{{ url_for('financeiro.mensalidades') }}">Boletos</a>
                <a href="{{ url_for('financeiro.novo_boleto') }}">Novo Boleto</a>
                <a href="{{ url_for('auth.logout') }}">Sair</a>
            </nav>
        </aside>

        <main class="content">
            <header class="page-header">
                <h1>Cadastrar Boleto</h1>
                <p>Registre uma nova mensalidade para o cliente</p>
            </header>

            <div class="card form-card">
                <form method="POST">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="cliente_id">Cliente</label>
                            <select id="cliente_id" name="cliente_id" required>
                                <option value="">Selecione</option>
                                {% for cliente in clientes %}
                                <option value="{{ cliente.id }}">{{ cliente.nome }} - {{ cliente.empresa }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="descricao">Descrição</label>
                            <input type="text" id="descricao" name="descricao" placeholder="Mensalidade contábil" required>
                        </div>
                        <div class="form-group">
                            <label for="valor">Valor</label>
                            <input type="number" step="0.01" id="valor" name="valor" required>
                        </div>
                        <div class="form-group">
                            <label for="vencimento">Vencimento</label>
                            <input type="date" id="vencimento" name="vencimento" required>
                        </div>
                        <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status" name="status" required>
                                <option value="Pendente">Pendente</option>
                                <option value="Pago">Pago</option>
                                <option value="Atrasado">Atrasado</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="codigo_boleto">Código do boleto</label>
                            <input type="text" id="codigo_boleto" name="codigo_boleto">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit">Salvar Boleto</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
