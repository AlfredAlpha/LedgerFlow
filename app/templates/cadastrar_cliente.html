<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente - LedgerFlow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2>LedgerFlow</h2>
            <nav>
                <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
                <a href="{{ url_for('clientes.lista') }}">Clientes</a>
                <a href="{{ url_for('clientes.novo') }}">Novo Cliente</a>
                <a href="{{ url_for('financeiro.mensalidades') }}">Boletos</a>
                <a href="{{ url_for('financeiro.novo_boleto') }}">Novo Boleto</a>
                <a href="{{ url_for('auth.logout') }}">Sair</a>
            </nav>
        </aside>

        <main class="content">
            <header class="page-header">
                <h1>Cadastrar Cliente</h1>
                <p>Insira os dados do novo cliente</p>
            </header>

            <div class="card form-card">
                <form method="POST">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nome">Nome</label>
                            <input type="text" id="nome" name="nome" required>
                        </div>
                        <div class="form-group">
                            <label for="empresa">Empresa</label>
                            <input type="text" id="empresa" name="empresa" required>
                        </div>
                        <div class="form-group">
                            <label for="cidade">Cidade</label>
                            <input type="text" id="cidade" name="cidade" required>
                        </div>
                        <div class="form-group">
                            <label for="documento">CPF/CNPJ</label>
                            <input type="text" id="documento" name="documento">
                        </div>
                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email">
                        </div>
                        <div class="form-group">
                            <label for="telefone">Telefone</label>
                            <input type="text" id="telefone" name="telefone">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit">Salvar Cliente</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
